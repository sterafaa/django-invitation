<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Обери дату ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#d8e9ff,#ffd6e8);
    overflow:hidden;
}

.container{
    width:430px;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#ff4f81;
    margin-bottom:25px;
}

input{
    margin-top:15px;
    padding:10px;
    width:100%;
    font-size:18px;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    margin-top:25px;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#ff4f81;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05)
    background:#ff2f6d;
}

#result{
    margin-top:30px;
    font-size:23px;
    color:#4CAF50;
    animation:show .8s;
}

@keyframes show{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.heart{
    position:fixed;
    top:-40px;
    font-size:28px;
    animation:fall 5s linear forwards;
    pointer-events:none;
}

@keyframes fall{

0%{
transform:translateY(-40px) rotate(0deg);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

</style>

</head>

<body>

<div class="container">

<h1> Обери дату, коли ми йдемо гуляти </h1>

<form method="POST" onsubmit="confirmDate(); return false;">
    {% csrf_token %}

    <input 
        type="datetime-local"
        id="datePicker"
        name="date"
    >

    <button type="submit">
        Підтвердити дату
    </button>

</form>
<div id="result"></div>

</div>

<script>

window.onload=function(){

const today=new Date().toISOString().slice(0,16);

document.getElementById("datePicker").min=today;

}

function confirmDate(){

const date=document.getElementById("datePicker").value;

if(!date){

alert("Спочатку вибери дату 😊");

return;

}

document.getElementById("result").innerHTML=`


<h2> Файноооо </h2>

<br>

<p>📅 ${date.replace("T"," ")}</p>

<br>

<p> Ждууууууу </p>

`;

document.getElementById("datePicker").style.display="none";

document.querySelector("button").style.display="none";

createHearts();

}

function createHearts(){

for(let i=0;i<30;i++){

setTimeout(function(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="🥰";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(20+Math.random()*25)+"px";

heart.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(heart);

setTimeout(function(){

heart.remove();

},6000);

},i*150);

}

}

</script>

</body>
</html>
